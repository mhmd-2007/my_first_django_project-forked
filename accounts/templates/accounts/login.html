{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | طلا و جواهر اینانلو</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<!-- ذرات طلایی پس‌زمینه -->
<div class="particles"></div>
<div class="glow-rings"></div>

<div class="auth-container">
    <div class="auth-card">
        <!-- لوگو -->
        <div class="logo">
            <div class="logo-icon">💎</div>
            <h1>طلا و جواهر اینانلو</h1>
            <p>سامانه نظرسنجی و تحلیل بازار</p>
        </div>

        <!-- عنوان -->
        <div class="form-title">
            <h2>خوش آمدید </h2><!--✨-->
            <p>لطفاً وارد حساب کاربری خود شوید</p>
        </div>

        <!-- پیام خطا -->
        {% if form.errors %}
        <div class="error-message">
            <span>⚠️</span>
            <span>نام کاربری یا رمز عبور اشتباه است</span>
        </div>
        {% endif %}

        <!-- فرم -->
        <form method="post" id="loginForm" onsubmit="return validateLoginForm()">
            {% csrf_token %}
            
            <div class="form-group">
                <label>نام کاربری</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" name="username" id="username" placeholder="نام کاربری خود را وارد کنید" autocomplete="off">
                </div>
            </div>

            <div class="form-group">
                <label>رمز عبور</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" id="password" placeholder="رمز عبور خود را وارد کنید">
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox">
                    <input type="checkbox" name="remember">
                    <span>مرا به خاطر بسپار</span>
                </label>
                <a href="#" class="forgot-link">فراموشی رمز؟</a>
            </div>

            <button type="submit" class="auth-btn">ورود به حساب کاربری</button>

            <div class="divider">
                <span>یا</span>
            </div>

            <div class="social-buttons">
                <button type="button" class="social-btn" onclick="socialLogin('گوگل')">🅶 گوگل</button>
                <button type="button" class="social-btn" onclick="socialLogin('گیت‌هاب')">🐙 گیت‌هاب</button>
            </div>
        </form>

        <div class="auth-link">
            عضو نیستید؟
            <a href="{% url 'register' %}">ثبت‌نام کنید</a>
        </div>
    </div>
</div>

<script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
